services:
  - type: web
    name: special-bet
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: special-bet-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /data/racing.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ADMIN_EMAIL
        value: admin@racingbet.com
      - key: ADMIN_PASSWORD
        value: Admin@123456
      - key: ADMIN_NAME
        value: superadmin
