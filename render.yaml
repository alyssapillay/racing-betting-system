services:
  - type: web
    name: racing-betting-system
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: racevault_jwt_secret_key_minimum_32_chars_change_me
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ADMIN_EMAIL
        value: admin@racingbet.com
      - key: ADMIN_PASSWORD
        value: Admin@123456
      - key: ADMIN_NAME
        value: System Owner
